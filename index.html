<!DOCTYPE html>
<html>
<head>

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>PSP Web App</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

#menu{
    margin-top:80px;
}

.item{
    font-size:28px;
    padding:10px;
}

.selected{
    color:yellow;
}

</style>

</head>

<body>

<h1>PSP MENU</h1>

<div id="menu">

<div class="item selected">Start Game</div>
<div class="item">Options</div>
<div class="item">Credits</div>
<div class="item">Exit</div>

</div>

<script>

var items = document.getElementsByClassName("item");
var index = 0;

function updateMenu(){

    var i;

    for(i=0;i<items.length;i++){
        items[i].className="item";
    }

    items[index].className="item selected";
}

document.onkeydown = function(e){

    var key = e.keyCode;

    if(key == 38){ // UP

        index--;

        if(index < 0){
            index = items.length - 1;
        }

        updateMenu();

    }

    if(key == 40){ // DOWN

        index++;

        if(index >= items.length){
            index = 0;
        }

        updateMenu();

    }

    if(key == 13){ // X BUTTON

        alert("Wybrałeś: " + items[index].innerHTML);

    }

}

</script>

</body>
</html>
